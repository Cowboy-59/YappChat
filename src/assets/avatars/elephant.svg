<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel elephant">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#3a3a44">
    <rect x="5" y="1" width="6" height="1"/>
    <rect x="4" y="2" width="1" height="1"/>
    <rect x="11" y="2" width="1" height="1"/>
    <rect x="2" y="3" width="1" height="5"/>
    <rect x="13" y="3" width="1" height="5"/>
    <rect x="3" y="8" width="10" height="1"/>
    <rect x="3" y="9" width="1" height="1"/>
    <rect x="12" y="9" width="1" height="1"/>
    <rect x="4" y="10" width="8" height="1"/>
    <rect x="4" y="11" width="2" height="3"/>
    <rect x="10" y="11" width="2" height="3"/>
    <rect x="5" y="14" width="1" height="1"/>
    <rect x="11" y="14" width="1" height="1"/>
    <!-- trunk outline -->
    <rect x="7" y="9" width="2" height="1"/>
    <rect x="6" y="10" width="1" height="3"/>
    <rect x="9" y="10" width="1" height="3"/>
    <rect x="7" y="13" width="2" height="1"/>
  </g>
  <!-- ears (big, lighter gray) -->
  <g fill="#bdbdbd">
    <rect x="2" y="3" width="3" height="5"/>
    <rect x="11" y="3" width="3" height="5"/>
  </g>
  <!-- body (mid gray) -->
  <g fill="#9e9e9e">
    <rect x="4" y="2" width="8" height="6"/>
    <rect x="5" y="8" width="6" height="2"/>
    <rect x="5" y="10" width="5" height="4"/>
    <!-- trunk -->
    <rect x="7" y="9" width="2" height="4"/>
  </g>
  <!-- eyes -->
  <g fill="#1a1a1a">
    <rect x="5" y="3" width="2" height="2"/>
    <rect x="9" y="3" width="2" height="2"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="3" width="1" height="1"/>
    <rect x="10" y="3" width="1" height="1"/>
  </g>
  <!-- tusks -->
  <g fill="#fffde7">
    <rect x="5" y="7" width="2" height="1"/>
    <rect x="9" y="7" width="2" height="1"/>
  </g>
  <!-- trunk tip -->
  <g fill="#bdbdbd">
    <rect x="7" y="12" width="2" height="1"/>
  </g>
</svg>
