<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel penguin">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#0a0a15">
    <rect x="5" y="1" width="6" height="1"/>
    <rect x="4" y="2" width="1" height="1"/>
    <rect x="11" y="2" width="1" height="1"/>
    <rect x="3" y="3" width="1" height="8"/>
    <rect x="12" y="3" width="1" height="8"/>
    <rect x="4" y="11" width="1" height="1"/>
    <rect x="11" y="11" width="1" height="1"/>
    <rect x="5" y="12" width="6" height="1"/>
    <rect x="4" y="13" width="1" height="1"/>
    <rect x="11" y="13" width="1" height="1"/>
    <rect x="5" y="14" width="2" height="1"/>
    <rect x="9" y="14" width="2" height="1"/>
  </g>
  <!-- body (black) -->
  <g fill="#1a1a2e">
    <rect x="4" y="2" width="8" height="9"/>
    <rect x="5" y="12" width="6" height="2"/>
  </g>
  <!-- belly (white) -->
  <g fill="#f5f5ff">
    <rect x="5" y="4" width="6" height="7"/>
  </g>
  <!-- eyes -->
  <g fill="#0a0a15">
    <rect x="5" y="3" width="2" height="2"/>
    <rect x="9" y="3" width="2" height="2"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="3" width="1" height="1"/>
    <rect x="10" y="3" width="1" height="1"/>
  </g>
  <!-- beak -->
  <g fill="#ffab00">
    <rect x="7" y="5" width="2" height="1"/>
    <rect x="6" y="6" width="4" height="1"/>
  </g>
  <!-- feet -->
  <g fill="#ffab00">
    <rect x="5" y="14" width="2" height="1"/>
    <rect x="9" y="14" width="2" height="1"/>
  </g>
  <!-- flippers -->
  <g fill="#0d0d1a">
    <rect x="3" y="5" width="1" height="4"/>
    <rect x="12" y="5" width="1" height="4"/>
  </g>
</svg>
