<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel fox">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#1a0800">
    <rect x="3" y="0" width="1" height="3"/>
    <rect x="12" y="0" width="1" height="3"/>
    <rect x="2" y="3" width="1" height="1"/>
    <rect x="13" y="3" width="1" height="1"/>
    <rect x="2" y="4" width="1" height="6"/>
    <rect x="13" y="4" width="1" height="6"/>
    <rect x="3" y="10" width="10" height="1"/>
    <rect x="4" y="11" width="1" height="3"/>
    <rect x="11" y="11" width="1" height="3"/>
    <rect x="5" y="14" width="6" height="1"/>
  </g>
  <!-- ear inner (cream) -->
  <g fill="#fdf4e7">
    <rect x="3" y="1" width="1" height="2"/>
    <rect x="12" y="1" width="1" height="2"/>
  </g>
  <!-- body (red-orange) -->
  <g fill="#e25822">
    <rect x="3" y="3" width="10" height="7"/>
    <rect x="5" y="10" width="6" height="4"/>
  </g>
  <!-- chest/muzzle (cream) -->
  <g fill="#fdf4e7">
    <rect x="5" y="6" width="6" height="4"/>
    <rect x="6" y="5" width="4" height="1"/>
  </g>
  <!-- eyes -->
  <g fill="#1a1a1a">
    <rect x="5" y="4" width="2" height="2"/>
    <rect x="9" y="4" width="2" height="2"/>
  </g>
  <g fill="#f5cd35">
    <rect x="5" y="4" width="1" height="1"/>
    <rect x="9" y="4" width="1" height="1"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="1"/>
  </g>
  <!-- nose -->
  <g fill="#1a1a1a">
    <rect x="7" y="6" width="2" height="1"/>
  </g>
  <!-- tail tip (white) -->
  <g fill="#fdf4e7">
    <rect x="13" y="11" width="2" height="3"/>
    <rect x="14" y="10" width="1" height="1"/>
  </g>
  <g fill="#1a0800">
    <rect x="13" y="10" width="1" height="1"/>
    <rect x="15" y="11" width="1" height="2"/>
  </g>
</svg>
