<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel monkey">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#3a1500">
    <rect x="2" y="3" width="2" height="3"/>
    <rect x="12" y="3" width="2" height="3"/>
    <rect x="4" y="2" width="8" height="1"/>
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="12" y="3" width="1" height="1"/>
    <rect x="3" y="9" width="10" height="1"/>
    <rect x="2" y="4" width="1" height="5"/>
    <rect x="13" y="4" width="1" height="5"/>
    <rect x="4" y="10" width="1" height="1"/>
    <rect x="11" y="10" width="1" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
    <rect x="4" y="12" width="1" height="2"/>
    <rect x="11" y="12" width="1" height="2"/>
    <rect x="5" y="14" width="6" height="1"/>
  </g>
  <!-- ears -->
  <g fill="#8b5e3c">
    <rect x="2" y="4" width="2" height="3"/>
    <rect x="12" y="4" width="2" height="3"/>
  </g>
  <g fill="#c49a6c">
    <rect x="2" y="5" width="1" height="1"/>
    <rect x="13" y="5" width="1" height="1"/>
  </g>
  <!-- body (brown) -->
  <g fill="#8b5e3c">
    <rect x="4" y="3" width="8" height="7"/>
    <rect x="5" y="10" width="6" height="4"/>
  </g>
  <!-- face (tan) -->
  <g fill="#d4956a">
    <rect x="5" y="5" width="6" height="4"/>
  </g>
  <!-- eyes -->
  <g fill="#1a1a1a">
    <rect x="5" y="4" width="2" height="2"/>
    <rect x="9" y="4" width="2" height="2"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="1"/>
  </g>
  <!-- nose -->
  <g fill="#3a1500">
    <rect x="7" y="7" width="2" height="1"/>
  </g>
  <!-- mouth smile -->
  <g fill="#3a1500">
    <rect x="6" y="8" width="1" height="1"/>
    <rect x="9" y="8" width="1" height="1"/>
  </g>
</svg>
