<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel pig">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#8a3050">
    <rect x="4" y="2" width="8" height="1"/>
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="12" y="3" width="1" height="1"/>
    <rect x="2" y="4" width="1" height="6"/>
    <rect x="13" y="4" width="1" height="6"/>
    <rect x="3" y="10" width="10" height="1"/>
    <rect x="4" y="11" width="1" height="3"/>
    <rect x="11" y="11" width="1" height="3"/>
    <rect x="5" y="14" width="6" height="1"/>
  </g>
  <!-- ears -->
  <g fill="#f4a0b8">
    <rect x="3" y="2" width="2" height="2"/>
    <rect x="11" y="2" width="2" height="2"/>
  </g>
  <g fill="#e97fa5">
    <rect x="3" y="2" width="1" height="1"/>
    <rect x="12" y="2" width="1" height="1"/>
  </g>
  <!-- body (pink) -->
  <g fill="#f4a0b8">
    <rect x="3" y="3" width="10" height="7"/>
    <rect x="5" y="10" width="6" height="4"/>
  </g>
  <!-- snout -->
  <g fill="#ff7da8">
    <rect x="5" y="6" width="6" height="3"/>
  </g>
  <!-- nostrils -->
  <g fill="#8a3050">
    <rect x="6" y="7" width="1" height="1"/>
    <rect x="9" y="7" width="1" height="1"/>
  </g>
  <!-- eyes -->
  <g fill="#1a1a1a">
    <rect x="5" y="4" width="2" height="2"/>
    <rect x="9" y="4" width="2" height="2"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="1"/>
  </g>
  <!-- curly tail hint -->
  <g fill="#8a3050">
    <rect x="12" y="11" width="1" height="1"/>
    <rect x="13" y="12" width="1" height="1"/>
    <rect x="12" y="13" width="1" height="1"/>
  </g>
  <g fill="#f4a0b8">
    <rect x="12" y="12" width="1" height="1"/>
  </g>
</svg>
