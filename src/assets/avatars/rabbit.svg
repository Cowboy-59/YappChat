<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel rabbit">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#4a4060">
    <rect x="4" y="0" width="2" height="1"/>
    <rect x="10" y="0" width="2" height="1"/>
    <rect x="3" y="1" width="1" height="4"/>
    <rect x="6" y="1" width="1" height="1"/>
    <rect x="9" y="1" width="1" height="1"/>
    <rect x="12" y="1" width="1" height="4"/>
    <rect x="2" y="5" width="1" height="1"/>
    <rect x="13" y="5" width="1" height="1"/>
    <rect x="2" y="6" width="1" height="5"/>
    <rect x="13" y="6" width="1" height="5"/>
    <rect x="3" y="11" width="10" height="1"/>
    <rect x="4" y="12" width="1" height="2"/>
    <rect x="11" y="12" width="1" height="2"/>
    <rect x="5" y="14" width="6" height="1"/>
  </g>
  <!-- ears (outer white) -->
  <g fill="#f0f0f8">
    <rect x="4" y="1" width="2" height="4"/>
    <rect x="10" y="1" width="2" height="4"/>
  </g>
  <!-- ears (inner pink) -->
  <g fill="#ffb3c6">
    <rect x="4" y="2" width="1" height="3"/>
    <rect x="11" y="2" width="1" height="3"/>
  </g>
  <!-- body -->
  <g fill="#f0f0f8">
    <rect x="3" y="5" width="10" height="6"/>
    <rect x="5" y="11" width="6" height="3"/>
  </g>
  <!-- belly -->
  <g fill="#ffffff">
    <rect x="5" y="7" width="6" height="4"/>
  </g>
  <!-- eyes -->
  <g fill="#ff2266">
    <rect x="5" y="6" width="2" height="2"/>
    <rect x="9" y="6" width="2" height="2"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="6" width="1" height="1"/>
    <rect x="10" y="6" width="1" height="1"/>
  </g>
  <!-- nose -->
  <g fill="#ffb3c6">
    <rect x="7" y="8" width="2" height="1"/>
  </g>
</svg>
