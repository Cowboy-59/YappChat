<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel panda">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#1a1a1a">
    <rect x="4" y="2" width="8" height="1"/>
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="12" y="3" width="1" height="1"/>
    <rect x="2" y="4" width="1" height="5"/>
    <rect x="13" y="4" width="1" height="5"/>
    <rect x="3" y="9" width="10" height="1"/>
    <rect x="4" y="10" width="1" height="1"/>
    <rect x="11" y="10" width="1" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
    <rect x="4" y="12" width="1" height="2"/>
    <rect x="11" y="12" width="1" height="2"/>
    <rect x="5" y="14" width="6" height="1"/>
  </g>
  <!-- ears (black) -->
  <g fill="#1a1a1a">
    <rect x="3" y="2" width="2" height="2"/>
    <rect x="11" y="2" width="2" height="2"/>
  </g>
  <!-- body (white) -->
  <g fill="#f5f5f5">
    <rect x="3" y="3" width="10" height="6"/>
    <rect x="5" y="9" width="6" height="5"/>
  </g>
  <!-- eye patches (black) -->
  <g fill="#1a1a1a">
    <rect x="4" y="5" width="3" height="3"/>
    <rect x="9" y="5" width="3" height="3"/>
  </g>
  <!-- eyes (white pupils) -->
  <g fill="#f5fbff">
    <rect x="5" y="6" width="1" height="1"/>
    <rect x="10" y="6" width="1" height="1"/>
  </g>
  <!-- nose -->
  <g fill="#1a1a1a">
    <rect x="7" y="7" width="2" height="1"/>
  </g>
  <!-- mouth -->
  <g fill="#1a1a1a">
    <rect x="6" y="8" width="1" height="1"/>
    <rect x="9" y="8" width="1" height="1"/>
  </g>
</svg>
