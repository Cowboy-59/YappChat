<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel dog">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#3a1500">
    <rect x="1" y="3" width="1" height="4"/>
    <rect x="2" y="2" width="1" height="1"/>
    <rect x="2" y="7" width="1" height="1"/>
    <rect x="14" y="3" width="1" height="4"/>
    <rect x="13" y="2" width="1" height="1"/>
    <rect x="13" y="7" width="1" height="1"/>
    <rect x="3" y="2" width="10" height="1"/>
    <rect x="3" y="8" width="10" height="1"/>
    <rect x="4" y="9" width="1" height="1"/>
    <rect x="11" y="9" width="1" height="1"/>
    <rect x="5" y="10" width="6" height="1"/>
    <rect x="4" y="11" width="1" height="3"/>
    <rect x="11" y="11" width="1" height="3"/>
    <rect x="5" y="14" width="2" height="1"/>
    <rect x="9" y="14" width="2" height="1"/>
  </g>
  <!-- ears (floppy, darker brown) -->
  <g fill="#8b4513">
    <rect x="2" y="3" width="1" height="4"/>
    <rect x="1" y="4" width="1" height="2"/>
    <rect x="13" y="3" width="1" height="4"/>
    <rect x="14" y="4" width="1" height="2"/> <!-- ears handled in outline+body overlap -->
  </g>
  <!-- body -->
  <g fill="#c8956c">
    <rect x="3" y="3" width="10" height="5"/>
    <rect x="5" y="9" width="6" height="1"/>
    <rect x="5" y="10" width="6" height="4"/>
  </g>
  <!-- muzzle -->
  <g fill="#f5e6d3">
    <rect x="5" y="6" width="6" height="3"/>
  </g>
  <!-- eyes -->
  <g fill="#1a1a1a">
    <rect x="5" y="4" width="2" height="2"/>
    <rect x="9" y="4" width="2" height="2"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="1"/>
  </g>
  <!-- nose -->
  <g fill="#1a1a1a">
    <rect x="7" y="6" width="2" height="1"/>
  </g>
  <!-- tongue -->
  <g fill="#e97fa5">
    <rect x="7" y="8" width="2" height="1"/>
  </g>
</svg>
