<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel parrot">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#0d2a1a">
    <rect x="5" y="1" width="6" height="1"/>
    <rect x="4" y="2" width="1" height="1"/>
    <rect x="11" y="2" width="1" height="1"/>
    <rect x="3" y="3" width="1" height="7"/>
    <rect x="12" y="3" width="1" height="7"/>
    <rect x="4" y="10" width="8" height="1"/>
    <rect x="4" y="11" width="1" height="3"/>
    <rect x="11" y="11" width="1" height="3"/>
    <rect x="5" y="14" width="6" height="1"/>
  </g>
  <!-- body (green) -->
  <g fill="#2daa57">
    <rect x="4" y="2" width="8" height="8"/>
    <rect x="5" y="10" width="6" height="4"/>
  </g>
  <!-- head crest -->
  <g fill="#f5cd35">
    <rect x="6" y="1" width="4" height="1"/>
  </g>
  <!-- wing highlight (darker green) -->
  <g fill="#1a7a3a">
    <rect x="3" y="5" width="2" height="4"/>
    <rect x="11" y="5" width="2" height="4"/>
  </g>
  <!-- breast (yellow) -->
  <g fill="#f5cd35">
    <rect x="6" y="4" width="4" height="4"/>
  </g>
  <!-- eye -->
  <g fill="#1a1a1a">
    <rect x="5" y="3" width="2" height="2"/>
    <rect x="9" y="3" width="2" height="2"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="3" width="1" height="1"/>
    <rect x="10" y="3" width="1" height="1"/>
  </g>
  <!-- beak -->
  <g fill="#f5a623">
    <rect x="7" y="5" width="2" height="1"/>
    <rect x="6" y="6" width="4" height="1"/>
  </g>
  <g fill="#0d2a1a">
    <rect x="7" y="6" width="2" height="1"/>
  </g>
  <!-- tail feathers -->
  <g fill="#1a7a3a">
    <rect x="7" y="14" width="2" height="1"/>
  </g>
  <g fill="#f5cd35">
    <rect x="6" y="14" width="1" height="1"/>
    <rect x="9" y="14" width="1" height="1"/>
  </g>
</svg>
