<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" role="img" aria-label="Pixel cat">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#3d2000">
    <rect x="3" y="1" width="1" height="2"/>
    <rect x="12" y="1" width="1" height="2"/>
    <rect x="2" y="3" width="2" height="1"/>
    <rect x="12" y="3" width="2" height="1"/>
    <rect x="2" y="4" width="1" height="6"/>
    <rect x="13" y="4" width="1" height="6"/>
    <rect x="3" y="10" width="1" height="1"/>
    <rect x="12" y="10" width="1" height="1"/>
    <rect x="4" y="11" width="8" height="1"/>
    <rect x="3" y="12" width="1" height="2"/>
    <rect x="12" y="12" width="1" height="2"/>
    <rect x="4" y="14" width="2" height="1"/>
    <rect x="10" y="14" width="2" height="1"/>
  </g>
  <!-- ears (inner) -->
  <g fill="#f4a261">
    <rect x="3" y="2" width="1" height="1"/>
    <rect x="12" y="2" width="1" height="1"/>
    <rect x="3" y="3" width="2" height="1"/>
    <rect x="11" y="3" width="2" height="1"/>
  </g>
  <!-- body -->
  <g fill="#f4a261">
    <rect x="3" y="4" width="10" height="6"/>
    <rect x="4" y="11" width="8" height="3"/>
    <rect x="4" y="14" width="2" height="1"/>
    <rect x="10" y="14" width="2" height="1"/>
  </g>
  <!-- belly -->
  <g fill="#fdebd0">
    <rect x="6" y="7" width="4" height="3"/>
  </g>
  <!-- eyes -->
  <g fill="#1a1a1a">
    <rect x="5" y="5" width="2" height="2"/>
    <rect x="9" y="5" width="2" height="2"/>
  </g>
  <g fill="#4fc3f7">
    <rect x="5" y="5" width="1" height="1"/>
    <rect x="9" y="5" width="1" height="1"/>
  </g>
  <g fill="#f5fbff">
    <rect x="6" y="5" width="1" height="1"/>
    <rect x="10" y="5" width="1" height="1"/>
  </g>
  <!-- nose -->
  <g fill="#e97fa5">
    <rect x="7" y="7" width="2" height="1"/>
  </g>
  <!-- stripes -->
  <g fill="#c8762a" opacity="0.5">
    <rect x="4" y="4" width="1" height="2"/>
    <rect x="11" y="4" width="1" height="2"/>
  </g>
</svg>
