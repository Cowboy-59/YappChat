name: auditfences

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  auditfences:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auditfences (strict)
        run: npx wxkanban-agent auditfences --strict
